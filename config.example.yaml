# Copy this file to config.yaml and fill in your own search criteria.
# config.yaml is gitignored so your search terms stay local.

location:
  zip: "94103"
  radius_miles: 50

# Each entry is searched independently against Craigslist. Keep them
# specific (make/model) to cut down on noise.
keywords:
  - "Surly Cross-Check"
  - "Rivendell"

# Sizes you're looking for. By default (strict_size_filter: false) every
# matching listing is shown regardless of size -- this list is just used
# to label whether the detected size is one you want, in the email.
sizes:
  - "S"
  - "M"
  - "52"
  - "54"

# false (default): show every matching listing regardless of size, just
#   label the detected size in the email so you can eyeball it yourself.
# true: drop listings where a size WAS found and it's not in the list above
#   (listings with no size mentioned at all are always shown either way).
strict_size_filter: false

email:
  to: "you@example.com"
